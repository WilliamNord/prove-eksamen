{% extends "base.html" %}

{% block tittel %}Forsiden{% endblock %}

{% block innhold %}
    <h1>Velkommen!</h1>
    <p>Dette er forsiden til min Flask-app.</p>

    {% if navn %}
        <p>Hei, {{ navn }}! Hyggelig aa se deg.</p>
    {% else %}
        <p>Hei, gjest!</p>
        <form method="post" action="/om">
            <input type="text" name="brukernavn" placeholder="Brukernavn" required>
            <input type="password" name="passord" placeholder="Passord" required>
            <button type="submit">Logg inn</button>
        </form>
    {% endif %}
{% endblock %}
