{% extends "base.html" %}

{% block innhold %}
    <h1>Soek</h1>

    <form method="POST" action="/sok">
        <label for="sokeord">Skriv inn et soekeord:</label>
        <input type="text" id="sokeord" name="sokeord" required>
        <button type="submit">Soek</button>
    </form>

    {% if resultat %}
        <h2>Resultat</h2>
        <p>Du soekte etter: <strong>{{ resultat }}</strong></p>
    {% endif %}
{% endblock %}
